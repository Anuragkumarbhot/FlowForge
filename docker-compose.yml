version: '3.9'

services:

  backend:
    build: ./backend
    container_name: flowforge-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - database

  worker:
    build: ./backend
    command: python workers/worker.py
    env_file:
      - .env
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: flowforge-frontend
    ports:
      - "3000:3000"

  database:
    image: mongo:6
    container_name: flowforge-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:latest
    container_name: flowforge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  mongo_data:
