version: "3.9"

services:

  backend:
    build: ./backend
    container_name: flowforge-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - database
      - redis

  worker:
    build: ./backend
    command: python workers/worker.py
    container_name: flowforge-worker
    env_file:
      - .env
    depends_on:
      - database
      - redis

  database:
    image: mongo:6
    container_name: flowforge-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: flowforge-redis
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: flowforge-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend

volumes:
  mongo_data:
